name: Node npm setup
description: "Set up Node.js environment and install dependencies."

inputs:
  working_directory:
    description: "Directory to run npm audit in (default: repository root)"
    required: false
    type: string
    default: "."

  node_version:
    description: "Node version to install (e.g., 24)"
    required: false
    type: string
    default: "24"

  registry_url:
    description: "The npm registry URL to publish to"
    required: false
    type: string
    default: ""

runs:
  using: "composite"

  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node_version }}
        registry-url: ${{ inputs.registry_url }}

    - name: Install Node Dependencies
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        npm ci
