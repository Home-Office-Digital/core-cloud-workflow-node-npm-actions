name: Building and then publishing Node npm project

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory to run npm audit in (default: repository root)"
        required: false
        type: string
        default: "."

      node_version:
        description: "Node version to install (e.g., 24)"
        required: false
        type: string
        default: "24"

      should_publish:
        description: "Should the project be published"
        required: false
        type: boolean
        default: false
      
      registry_url:
        description: "The npm registry URL to publish to"
        required: true
        type: string
    
    secrets:
      node_access_token:
        description: "The npm access token to authenticate publishing"
        required: false

jobs:
  build-publish:
    name: "Run"
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout Code
        uses: actions/checkout@v6
      
      - name: Set up node and deps
        uses: Home-Office-Digital/core-cloud-workflow-node-npm-actions/actions/setup@1.3.0
        with:
          working_directory: ${{ inputs.working_directory }}
          node_version: ${{ inputs.node_version }}
          registry_url: ${{ inputs.registry_url }}

      - name: Run npm build
        uses: Home-Office-Digital/core-cloud-workflow-node-npm-actions/actions/build@1.3.0
        with:
          working_directory: ${{ inputs.working_directory }}
      
      - name: Run npm publish
        if: ${{ inputs.should_publish }}
        uses: Home-Office-Digital/core-cloud-workflow-node-npm-actions/actions/publish@1.3.0
        with:
          working_directory: ${{ inputs.working_directory }}
          node_access_token: ${{ secrets.node_access_token }}